# Default spratlayout profiles.

[profile desktop]
label=Desktop
mode=compact
optimize=gpu
max_width=8192
max_height=8192
padding=2
extrude=0
trim_transparent=true

[profile mobile]
label=Mobile
mode=compact
optimize=gpu
max_width=2048
max_height=2048
padding=2
extrude=0
trim_transparent=true

[profile legacy]
label=Legacy (POT)
mode=pot
optimize=gpu
max_width=2048
max_height=2048
padding=1
extrude=0
trim_transparent=true

[profile space]
label=Space Efficient
mode=compact
optimize=space
padding=0
rotate=true
trim_transparent=true

[profile fast]
label=Fast
mode=fast
optimize=gpu
padding=0
trim_transparent=false

[profile css]
label=CSS Sprites
mode=compact
optimize=space
padding=0
trim_transparent=false
